name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_CONFIG: .gitleaks.toml

  verify:
    needs: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - run: cp .env.example .env

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-android:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Read version
        id: version
        run: |
          VERSION_LINE="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          VERSION_NAME="${VERSION_LINE%%+*}"
          VERSION_CODE="${VERSION_LINE##*+}"
          echo "version_name=${VERSION_NAME}" >> "${GITHUB_OUTPUT}"
          echo "version_code=${VERSION_CODE}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${VERSION_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Setup Android NDK
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "ndk;28.2.13676358"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/28.2.13676358" >> "${GITHUB_ENV}"

      - name: Build libbox
        run: ./scripts/build-libbox.sh

      - name: Configure ephemeral signing (sideload builds only)
        run: |
          mkdir -p android/release-keys
          cat > android/key.properties <<'EOF'
          playstore.storeFile=../release-keys/erebrus-vpn-playstore.jks
          playstore.storePassword=ci-sideload
          playstore.keyAlias=erebrus-vpn-playstore
          playstore.keyPassword=ci-sideload
          dappstore.storeFile=../release-keys/erebrus-vpn-dappstore.jks
          dappstore.storePassword=ci-sideload
          dappstore.keyAlias=erebrus-vpn-dappstore
          dappstore.keyPassword=ci-sideload
          EOF
          keytool -genkeypair -v \
            -keystore android/release-keys/erebrus-vpn-playstore.jks \
            -alias erebrus-vpn-playstore \
            -keyalg RSA -keysize 2048 -validity 1 \
            -storepass ci-sideload -keypass ci-sideload \
            -dname "CN=Erebrus VPN CI, OU=Sideload, O=NetSepio, L=CI, ST=CI, C=US"
          keytool -genkeypair -v \
            -keystore android/release-keys/erebrus-vpn-dappstore.jks \
            -alias erebrus-vpn-dappstore \
            -keyalg RSA -keysize 2048 -validity 1 \
            -storepass ci-sideload -keypass ci-sideload \
            -dname "CN=Erebrus VPN CI, OU=Sideload, O=NetSepio, L=CI, ST=CI, C=US"

      - run: flutter pub get

      - name: Build release APKs
        run: |
          flutter build apk --flavor playstore --release
          flutter build apk --flavor dappstore --release

      - name: Package sideload artifacts
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-playstore-release.apk \
            "dist/erebrus-vpn-playstore-${{ steps.version.outputs.tag }}.apk"
          cp build/app/outputs/flutter-apk/app-dappstore-release.apk \
            "dist/erebrus-vpn-dappstore-${{ steps.version.outputs.tag }}.apk"
          cat > dist/README.txt <<EOF
          Erebrus VPN sideload builds (${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.version_code }})

          These APKs are built in CI with an ephemeral signing key for testing only.
          They are not signed for Google Play or the Solana dApp Store.

          - erebrus-vpn-playstore-*.apk  -> general Android / Google Play flavor
          - erebrus-vpn-dappstore-*.apk  -> Solana dApp Store flavor
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: android-sideload-${{ steps.version.outputs.tag }}
          if-no-files-found: error
          path: dist/*

  build-macos:
    needs: verify
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Read version tag
        id: version
        run: |
          VERSION_LINE="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          VERSION_NAME="${VERSION_LINE%%+*}"
          echo "tag=v${VERSION_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Configure build env
        run: cp env.example .env

      - run: pip install pillow
      - run: chmod +x scripts/build-desktop.sh scripts/fetch-singbox-cli.sh
      - run: ./scripts/build-desktop.sh macos

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ steps.version.outputs.tag }}
          if-no-files-found: error
          path: dist/*

  build-linux:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Read version tag
        id: version
        run: |
          VERSION_LINE="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          VERSION_NAME="${VERSION_LINE%%+*}"
          echo "tag=v${VERSION_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Configure build env
        run: cp env.example .env

      - run: pip install pillow
      - run: chmod +x scripts/build-desktop.sh scripts/fetch-singbox-cli.sh
      - run: ./scripts/build-desktop.sh linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ steps.version.outputs.tag }}
          if-no-files-found: error
          path: dist/*

  build-windows:
    needs: verify
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Read version tag
        id: version
        shell: bash
        run: |
          VERSION_LINE="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          VERSION_NAME="${VERSION_LINE%%+*}"
          echo "tag=v${VERSION_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Configure build env
        shell: bash
        run: cp env.example .env

      - run: pip install pillow
      - run: chmod +x scripts/build-desktop.sh scripts/fetch-singbox-cli.sh
      - run: ./scripts/build-desktop.sh windows

      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ steps.version.outputs.tag }}
          if-no-files-found: error
          path: dist/*

  github-release:
    needs: [build-android, build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION_LINE="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          VERSION_NAME="${VERSION_LINE%%+*}"
          VERSION_CODE="${VERSION_LINE##*+}"
          echo "version_name=${VERSION_NAME}" >> "${GITHUB_OUTPUT}"
          echo "version_code=${VERSION_CODE}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${VERSION_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}" --force

      - uses: actions/download-artifact@v4
        with:
          pattern: "*-${{ steps.version.outputs.tag }}"
          merge-multiple: true
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Erebrus VPN ${{ steps.version.outputs.version_name }}
          generate_release_notes: true
          body: |
            Sideload builds for testing. Android APKs are not signed with production store keys.

            Version: `${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.version_code }}`

            | Artifact | Platform |
            |----------|----------|
            | `erebrus-vpn-playstore-*.apk` | Android (Google Play flavor) |
            | `erebrus-vpn-dappstore-*.apk` | Android (Solana dApp Store) |
            | `erebrus-vpn-macos-*.zip` | macOS `.app` |
            | `erebrus-vpn-windows-*.zip` | Windows |
            | `erebrus-vpn-linux-*.tar.gz` | Linux bundle |
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}